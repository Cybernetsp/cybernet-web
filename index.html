<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cybernet Bot - Centro de Códigos</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --card-bg: #141414;
      --accent: #e50914; /* Rojo Netflix */
      --text-main: #ffffff;
      --text-dim: #a3a3a3;
      --input-bg: #222222;
      --whatsapp: #25D366;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

    body { 
      background: var(--bg); 
      color: var(--text-main); 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
      padding: 1.5rem;
    }

    /* Contenedor Principal */
    .container {
      background: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      padding: 3rem 2rem;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    h2 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.8rem; letter-spacing: -0.5px; }
    p { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 2rem; line-height: 1.6; }

    .step { display: none; animation: slideUp 0.4s ease-out; }
    .step.active { display: block; }

    /* Inputs Estilizados */
    input {
      width: 100%; 
      padding: 1rem; 
      margin-bottom: 1.2rem; 
      border-radius: 12px;
      border: 1px solid #333; 
      background: var(--input-bg); 
      color: white;
      font-size: 1rem; 
      outline: none; 
      text-align: center;
      transition: all 0.3s;
    }
    input:focus { border-color: var(--accent); background: #2a2a2a; }

    /* Botones */
    button {
      width: 100%; 
      padding: 1rem; 
      margin-bottom: 1rem; 
      border-radius: 12px;
      border: none; 
      background: var(--accent); 
      color: white;
      font-size: 0.9rem; 
      font-weight: 600; 
      cursor: pointer; 
      text-transform: uppercase;
      transition: all 0.3s ease;
    }
    button:hover { background: #b20710; transform: translateY(-2px); }

    .btn-secondary { background: #333; }
    .btn-secondary:hover { background: #444; }

    .btn-whatsapp { 
      background: transparent; 
      border: 2px solid var(--whatsapp); 
      color: var(--whatsapp); 
    }
    .btn-whatsapp:hover { background: var(--whatsapp); color: white; }

    /* Animaciones y Loader */
    .loader {
      border: 3px solid rgba(255, 255, 255, 0.1); 
      border-top: 3px solid var(--accent);
      border-radius: 50%; width: 50px; height: 50px; 
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.5rem auto;
    }

    /* Caja de Resultados */
    .result-box {
      background: #1f1f1f; 
      border: 1px solid var(--accent); 
      padding: 2rem; 
      border-radius: 15px; 
      margin-bottom: 1.5rem;
    }
    .result-code { font-size: 3.2rem; font-weight: 800; color: var(--text-main); letter-spacing: 8px; }
    .timer { font-size: 0.8rem; color: var(--accent); margin-top: 0.8rem; font-weight: 600; text-transform: uppercase; }

    #error-toast {
      display: none; 
      background: rgba(229, 9, 20, 0.1); 
      color: #ff4d4d;
      padding: 1rem; 
      border-radius: 10px; 
      font-size: 0.85rem; 
      margin-bottom: 1.5rem;
      border-left: 4px solid var(--accent);
    }

    @keyframes slideUp { 
        from { opacity: 0; transform: translateY(20px); } 
        to { opacity: 1; transform: translateY(0); } 
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .back-btn { 
        display: block; 
        margin-top: 15px; 
        color: var(--text-dim); 
        font-size: 0.8rem; 
        text-decoration: none; 
        cursor: pointer;
    }
    .back-btn:hover { color: white; }
  </style>
</head>
<body>

  <div class="container">
    <h2 id="main-title">CYBERNET</h2>
    <div id="error-toast"></div>
    
    <div id="step-1" class="step active">
      <p>Ingresa tu número de celular registrado para continuar.</p>
      <input type="tel" id="telefono" placeholder="Número de Celular" maxlength="10">
      <button onclick="nextStep(2)">Siguiente</button>
      <a href="https://wa.me/573127706726" target="_blank" style="text-decoration:none;">
        <button class="btn-whatsapp">Soporte WhatsApp</button>
      </a>
    </div>

    <div id="step-2" class="step">
      <p>Selecciona tu plataforma</p>
      <button class="btn-secondary" onclick="setPlataforma('NETFLIX')">🔴 Netflix</button>
      <button class="btn-secondary" onclick="setPlataforma('DISNEY')" style="border-left: 4px solid #00bfff;">🔵 Disney Premium</button>
      <span class="back-btn" onclick="prevStep(1)">← Volver</span>
    </div>

    <div id="step-3" class="step">
      <p>¿Qué tipo de acceso necesitas?</p>
      <button class="btn-secondary" onclick="setOpcion(1)">🔑 Inicio de Sesión</button>
      <button class="btn-secondary" onclick="setOpcion(2)">✈️ Estoy de Viaje</button>
      <button class="btn-secondary" onclick="setOpcion(3)">📧 Enlace de Acceso</button>
      <span class="back-btn" onclick="prevStep(2)">← Volver</span>
    </div>

    <div id="step-4" class="step">
      <p>Ingresa el correo de la cuenta</p>
      <input type="email" id="correo" placeholder="ejemplo@cybernetsp.com" autocomplete="off">
      <button onclick="procesar()">Obtener Código</button>
      <span class="back-btn" onclick="prevStep(2)">← Volver al inicio</span>
    </div>

    <div id="step-5" class="step">
      <div class="loader"></div>
      <p>Verificando credenciales...</p>
    </div>

    <div id="step-6" class="step">
      <h2 id="res-titulo">Acceso</h2>
      <p id="res-mensaje"></p>
      
      <div id="res-caja" class="result-box" style="display:none;">
        <div id="res-codigo" class="result-code">0000</div>
        <div id="res-timer" class="timer">Tiempo restante: --:--</div>
      </div>

      <div id="res-link-caja" style="display:none;">
        <a id="res-link" href="#" target="_blank" style="text-decoration:none;">
          <button>Abrir Enlace de Acceso</button>
        </a>
      </div>

      <button class="btn-secondary" onclick="reiniciar()">Nueva Consulta</button>
      <a href="https://wa.me/573127706726" target="_blank" style="display:none; text-decoration:none;" id="soporte-btn">
        <button class="btn-whatsapp">Contactar Soporte</button>
      </a>
    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyk2_OGWfJ9qTSKOuRVo7bcspAKBRUn_WLEdP28GuabQ5z7cDYShYhMlHfCiuTOoQ66/exec"; 

    let userData = { telefono: '', plataforma: '', opcion: 1, correo: '' };

    function mostrarError(mensaje) {
      const toast = document.getElementById('error-toast');
      toast.innerText = mensaje;
      toast.style.display = 'block';
      setTimeout(() => { toast.style.display = 'none'; }, 4000);
    }

    function nextStep(step) {
      if(step === 2) {
        let tel = document.getElementById('telefono').value.replace(/\D/g, '');
        if(tel.length < 7) { mostrarError("❌ Ingresa un celular válido."); return; }
        userData.telefono = tel;
      }
      document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
      document.getElementById('step-' + step).classList.add('active');
    }

    function prevStep(step) {
      document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
      document.getElementById('step-' + step).classList.add('active');
    }

    function setPlataforma(plat) {
      userData.plataforma = plat;
      plat === 'NETFLIX' ? nextStep(3) : (userData.opcion = 1, nextStep(4));
    }

    function setOpcion(op) { userData.opcion = op; nextStep(4); }

    function reiniciar() {
      userData = { telefono: '', plataforma: '', opcion: 1, correo: '' };
      document.getElementById('telefono').value = '';
      document.getElementById('correo').value = '';
      nextStep(1);
    }

    async function procesar() {
      let email = document.getElementById('correo').value.toLowerCase().trim();
      if(!email.includes('@')) { mostrarError("❌ Correo no válido."); return; }
      userData.correo = email;
      nextStep(5); 

      try {
        const params = new URLSearchParams(userData);
        const response = await fetch(`${WEB_APP_URL}?${params.toString()}`);
        const res = await response.json();
        mostrarResultado(res);
      } catch (error) {
        mostrarResultado({ exito: false, msj: "Error de servidor. Reintenta.", soporte: true });
      }
    }

    function mostrarResultado(res) {
      nextStep(6);
      document.getElementById('res-caja').style.display = 'none';
      document.getElementById('res-link-caja').style.display = 'none';
      document.getElementById('soporte-btn').style.display = res.soporte ? 'block' : 'none';
      
      document.getElementById('res-mensaje').innerText = res.msj;
      if(res.exito) {
        if(res.tipo === 'codigo') {
          document.getElementById('res-caja').style.display = 'block';
          document.getElementById('res-codigo').innerText = res.valor;
          document.getElementById('res-timer').innerText = `Expira en: ${res.tiempo}`;
        } else if (res.tipo === 'link') {
          document.getElementById('res-link-caja').style.display = 'block';
          document.getElementById('res-link').href = res.valor;
        }
      }
    }
  </script>
</body>
</html>
